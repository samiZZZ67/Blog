<h2>Add a comment</h2>
<form action="{% url 'blog:post_comment' post_id=post.id %}" method="post">
    <!-- {{form.as_p}} -->
  <div class="left">
    {{ form.name.as_field_group }}
  </div>
  <div class="left">
    {{ form.email.as_field_group }}
  </div>
  {{ form.body.as_field_group }}
    {%csrf_token%}
     <p><input type="submit" value="Add comment"></p>
</form>
